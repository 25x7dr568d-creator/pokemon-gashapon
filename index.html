<title>寶可夢扭蛋 - 今天的搭檔是誰？</title>
<style>
:root {
  --pb-red: #EE1515;
  --pb-red-deep: #C50B0B;
  --pb-white: #FFFFFF;
  --pb-dark: #222224;
  --pika-yellow: #FFCB05;
  --pika-yellow-deep: #F5A623;
  --poke-blue: #3B4CCA;
  --poke-blue-light: #5C7AEB;
  --cream: #FFF8E7;
  --bg-gradient-1: #FFE082;
  --bg-gradient-2: #FFF3C4;
  --bg-gradient-3: #FFE5A8;
  --text: #2C2C2C;
  --text-light: #666;
  --gold: #FFD700;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, 'Noto Sans TC', 'PingFang TC', sans-serif;
  background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 40%, var(--bg-gradient-3) 100%);
  background-attachment: fixed;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 10px 40px;
  overflow-x: hidden;
  color: var(--text);
}

/* === 動畫 === */
@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes glowPulse {
  0%, 100% { opacity: 0.9; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.03); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px) rotate(-1deg); }
  75% { transform: translateX(5px) rotate(1deg); }
}
@keyframes ballBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes twistSpin {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(180deg); }
  100% { transform: rotate(360deg); }
}
@keyframes capsuleBounceIn {
  0% { transform: translateY(-400px) scale(0.5); opacity: 0; }
  50% { transform: translateY(20px) scale(1.1); opacity: 1; }
  70% { transform: translateY(-15px) scale(0.95); }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
@keyframes sparkleOut {
  0% { transform: translate(0,0) scale(0); opacity: 1; }
  100% { transform: var(--sparkle-end) scale(1.2); opacity: 0; }
}
@keyframes cardPop {
  0% { transform: translate(-50%,-50%) scale(0) rotate(-10deg); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
}
@keyframes confettiFall {
  0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes floatParticle {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}
@keyframes pikaWiggle {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
@keyframes pokeRedFlash {
  0%, 100% { box-shadow: 0 0 0 0 rgba(238,21,21,0.4); }
  50% { box-shadow: 0 0 0 15px rgba(238,21,21,0); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(0.95); }
}
@keyframes flashCaught {
  0% { filter: brightness(1); }
  50% { filter: brightness(3) saturate(0); }
  100% { filter: brightness(1); }
}

/* === 背景裝飾 === */
.bg-deco {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* === 頂部 Nav === */
.top-nav {
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding: 0 10px;
  z-index: 10;
}
.nav-btn {
  padding: 10px 18px;
  border-radius: 22px;
  background: rgba(255,255,255,0.85);
  border: 3px solid var(--pb-red);
  color: var(--pb-red-deep);
  font-weight: 800;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.nav-btn.active {
  background: var(--pb-red);
  color: white;
}
.collection-count {
  font-size: 18px;
  font-weight: 900;
  color: var(--pb-red-deep);
  background: white;
  padding: 8px 16px;
  border-radius: 22px;
  border: 3px solid var(--pika-yellow);
}

/* === 標題區 === */
.title-section {
  text-align: center;
  margin-bottom: 16px;
  position: relative;
  z-index: 5;
}
.main-title {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(90deg, var(--pb-red), var(--pika-yellow-deep), var(--poke-blue), var(--pb-red));
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s linear infinite;
  letter-spacing: 2px;
  text-shadow: 0 2px 0 rgba(255,255,255,0.3);
  margin-bottom: 6px;
}
.sub-title {
  font-size: 20px;
  color: var(--text-light);
  font-weight: 700;
}

/* === 今日搭檔條（主視覺） === */
.today-partner {
  background: linear-gradient(180deg, #FFFDF5, white);
  border: 4px solid var(--pika-yellow);
  border-radius: 28px;
  padding: 18px 20px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(255,203,5,0.35), 0 0 0 6px rgba(255,203,5,0.15);
  max-width: 320px;
  width: 88%;
  position: relative;
}
.today-partner img {
  width: 130px;
  height: 130px;
  object-fit: contain;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
  animation: glowPulse 2.5s ease-in-out infinite;
}
.today-partner-text {
  text-align: center;
  width: 100%;
}
.today-partner-label {
  font-size: 16px;
  color: var(--pika-yellow-deep);
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.today-partner-name {
  font-size: 36px;
  color: var(--pb-red-deep);
  font-weight: 900;
  letter-spacing: 3px;
}
.today-partner.empty img {
  display: none !important;
}
.today-partner.empty {
  padding: 22px 20px;
}
.today-partner.empty .today-partner-name {
  color: var(--text-light);
  font-size: 20px;
  font-weight: 700;
}

/* === 扭蛋機 === */
.machine {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 10px auto 20px;
  position: relative;
  z-index: 5;
}

.machine-crown {
  font-size: 42px;
  text-align: center;
  margin-bottom: -8px;
  z-index: 2;
  filter: drop-shadow(0 2px 4px rgba(238,21,21,0.3));
  animation: pikaWiggle 2s ease-in-out infinite;
}

.machine-top {
  width: 340px;
  height: 230px;
  background: linear-gradient(180deg, #FFF5F5, #FFE8E8, #FFD6D6);
  border-radius: 130px 130px 16px 16px;
  border: 6px solid var(--pb-red);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 24px rgba(238,21,21,0.25), inset 0 0 30px rgba(255,255,255,0.5);
}

.machine-top .glass {
  width: 300px;
  height: 190px;
  background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,220,220,0.3), rgba(255,255,255,0.6));
  border-radius: 110px 110px 12px 12px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 18px 10px 10px;
}

/* 迷你精靈球（玻璃內 6 顆） */
.mini-ball {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
  border: 2px solid var(--pb-dark);
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  animation: glowPulse 3s ease-in-out infinite;
}
.mini-ball .ball-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: var(--pb-red);
}
.mini-ball .ball-bottom {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  background: var(--pb-white);
}
.mini-ball .ball-line {
  position: absolute;
  top: 48%;
  left: 0; right: 0;
  height: 4px;
  background: var(--pb-dark);
}
.mini-ball .ball-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  background: white;
  border: 3px solid var(--pb-dark);
  border-radius: 50%;
  z-index: 2;
}
.mini-ball::before {
  content: '';
  position: absolute;
  top: 5px;
  left: 8px;
  width: 12px;
  height: 9px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  transform: rotate(-30deg);
  z-index: 3;
}

/* 超級球、高級球、大師球配色 */
.mini-ball.great .ball-top { background: var(--poke-blue); }
.mini-ball.ultra .ball-top { background: #FFD700; }
.mini-ball.master .ball-top { background: #9747E0; }

.machine-body {
  width: 360px;
  background: linear-gradient(180deg, var(--pb-red), #D10E0E, var(--pb-red-deep));
  border-radius: 8px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  border: 5px solid var(--pb-red);
  box-shadow: 0 4px 12px rgba(238,21,21,0.3);
}

.deco-left, .deco-right {
  position: absolute;
  top: 10px;
  font-size: 24px;
}
.deco-left { left: 14px; transform: rotate(-20deg); }
.deco-right { right: 14px; transform: rotate(20deg) scaleX(-1); }

.coin-slot {
  width: 50px;
  height: 8px;
  background: white;
  border-radius: 4px;
  border: 2px solid var(--pb-dark);
}

.twist-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #FFE980, var(--pika-yellow), var(--pika-yellow-deep));
  border: 6px solid var(--pb-dark);
  cursor: pointer;
  font-size: 30px;
  font-weight: 900;
  color: var(--pb-dark);
  animation: glowPulse 2s ease-in-out infinite, pokeRedFlash 2s ease-in-out infinite;
  box-shadow: 0 6px 20px rgba(255,203,5,0.6), inset 0 -4px 8px rgba(0,0,0,0.15);
  position: relative;
  z-index: 10;
  text-shadow: 0 2px 0 rgba(255,255,255,0.4);
}
.twist-btn:active { transform: scale(0.9); }
.twist-btn.spinning { animation: twistSpin 0.6s ease-in-out; pointer-events: none; }

.machine-exit {
  width: 120px;
  height: 44px;
  background: var(--pb-dark);
  border-radius: 0 0 60px 60px;
  margin-top: -4px;
  border: 5px solid var(--pb-red);
  border-top: none;
  overflow: hidden;
}
.machine-exit-inner {
  width: 80px;
  height: 30px;
  background: #000;
  border-radius: 0 0 40px 40px;
  margin: 0 auto;
}

.machine-feet {
  display: flex;
  gap: 120px;
  margin-top: -2px;
}
.foot {
  width: 30px;
  height: 12px;
  background: var(--pb-red);
  border-radius: 0 0 8px 8px;
}

.machine.shaking .machine-top {
  animation: shake 0.15s ease-in-out 10;
}
.machine.shaking .mini-ball {
  animation: ballBounce 0.3s ease-in-out infinite;
}
.machine.shaking .mini-ball:nth-child(2) { animation-delay: 0.05s; }
.machine.shaking .mini-ball:nth-child(3) { animation-delay: 0.1s; }
.machine.shaking .mini-ball:nth-child(4) { animation-delay: 0.15s; }
.machine.shaking .mini-ball:nth-child(5) { animation-delay: 0.2s; }
.machine.shaking .mini-ball:nth-child(6) { animation-delay: 0.25s; }

/* === 膠囊 Overlay（精靈球樣式） === */
.capsule-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(8px);
}
.capsule-overlay.active { display: flex; }

.capsule {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  border: 5px solid var(--pb-dark);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
.capsule.bounce { animation: capsuleBounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1); }

.capsule-face {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: radial-gradient(circle, #FFFEF7 0%, #FFF3C4 100%);
  display: flex;
  align-items: center;
  justify-content: center;
}
.capsule-face img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 12px;
}

.capsule-top-half {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: var(--pb-red);
  border-radius: 115px 115px 0 0;
  transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 2;
}
.capsule-bottom-half {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 52%;
  background: white;
  border-radius: 0 0 115px 115px;
  z-index: 1;
}
.capsule-line {
  position: absolute;
  top: 49%; left: 0; right: 0;
  height: 6px;
  background: var(--pb-dark);
  z-index: 3;
}
.capsule-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 50px; height: 50px;
  background: white;
  border: 5px solid var(--pb-dark);
  border-radius: 50%;
  z-index: 4;
}
.capsule-center::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
  background: #DDD;
  border-radius: 50%;
  border: 2px solid var(--pb-dark);
}
.capsule-shine {
  position: absolute;
  top: 20px; left: 35px;
  width: 26px; height: 18px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  transform: rotate(-30deg);
  z-index: 5;
}

.capsule.opened .capsule-top-half {
  transform: translateY(-60px) rotate(-40deg);
  background: transparent !important;
}
.capsule.opened .capsule-bottom-half {
  background: transparent !important;
  transition: background 0.3s;
}
.capsule.opened .capsule-line {
  opacity: 0;
  transition: opacity 0.3s;
}
.capsule.opened .capsule-shine {
  opacity: 0;
  transition: opacity 0.3s;
}
.capsule.opened .capsule-center {
  opacity: 0;
  transition: opacity 0.3s;
}

.magic-sparkles {
  position: absolute;
  width: 220px; height: 220px;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  pointer-events: none;
  z-index: 10;
}
.sparkle {
  position: absolute;
  font-size: 22px;
  animation: sparkleOut 0.8s ease-out forwards;
  opacity: 0;
}

.capsule-tap-hint {
  font-size: 22px;
  font-weight: 800;
  color: white;
  margin-top: 24px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  animation: pulse 1.2s ease-in-out infinite;
  text-align: center;
}

/* === 結果卡 === */
.result-card {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: linear-gradient(135deg, #FFFEF7, var(--cream), #FFF3C4);
  border-radius: 28px;
  padding: 28px 24px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(238,21,21,0.3), 0 0 0 6px var(--pika-yellow);
  max-width: 320px;
  width: 88%;
  display: none;
  z-index: 300;
}
.result-card.active {
  display: block;
  animation: cardPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

.corner-deco {
  position: absolute;
  font-size: 22px;
}
.corner-deco.tl { top: 10px; left: 12px; }
.corner-deco.tr { top: 10px; right: 12px; }
.corner-deco.bl { bottom: 10px; left: 12px; }
.corner-deco.br { bottom: 10px; right: 12px; }

.result-char {
  width: 150px;
  height: 150px;
  object-fit: contain;
  margin-bottom: 8px;
  animation: glowPulse 2s ease-in-out infinite;
  filter: drop-shadow(0 6px 10px rgba(0,0,0,0.15));
}
.result-char.new-catch {
  animation: flashCaught 0.8s ease-out, glowPulse 2s ease-in-out 0.8s infinite;
}

.result-number {
  font-size: 18px;
  color: var(--text-light);
  font-weight: 800;
  margin-bottom: 4px;
}

.result-name {
  font-size: 44px;
  font-weight: 900;
  color: var(--pb-red-deep);
  margin-bottom: 10px;
  letter-spacing: 3px;
}

.result-dialogue {
  font-size: 22px;
  color: var(--text);
  font-weight: 700;
  background: white;
  padding: 16px 18px;
  border-radius: 18px;
  border: 3px dashed var(--pika-yellow);
  margin-bottom: 14px;
  line-height: 1.4;
}

.result-badge {
  display: inline-block;
  font-size: 16px;
  color: white;
  background: var(--pb-red);
  padding: 6px 16px;
  border-radius: 14px;
  font-weight: 900;
  margin-bottom: 16px;
}
.result-badge.new {
  background: linear-gradient(90deg, #FFD700, #FFA500);
  color: var(--pb-dark);
  animation: glowPulse 1s ease-in-out infinite;
}

.btn-retry {
  display: block;
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 30px;
  font-size: 24px;
  font-weight: 900;
  color: white;
  background: linear-gradient(90deg, var(--pb-red), var(--pika-yellow-deep), var(--pb-red));
  background-size: 200% auto;
  animation: shimmer 3s linear infinite;
  cursor: pointer;
  margin-bottom: 10px;
  box-shadow: 0 4px 15px rgba(238,21,21,0.4);
}

.btn-close {
  display: block;
  width: 100%;
  padding: 14px;
  border: 3px solid var(--pika-yellow);
  border-radius: 30px;
  font-size: 20px;
  font-weight: 800;
  color: var(--text-light);
  background: rgba(255,255,255,0.8);
  cursor: pointer;
}

/* === 圖鑑頁面 === */
.dex-page {
  display: none;
  width: 100%;
  max-width: 500px;
  z-index: 5;
}
.dex-page.active { display: block; }

.dex-header {
  background: white;
  border: 4px solid var(--pb-red);
  border-radius: 20px;
  padding: 16px 20px;
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.dex-title {
  font-size: 28px;
  font-weight: 900;
  color: var(--pb-red-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  letter-spacing: 2px;
}
.dex-title-icon {
  width: 44px;
  height: 44px;
  object-fit: contain;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
}
.dex-progress {
  font-size: 20px;
  font-weight: 900;
  color: var(--pika-yellow-deep);
}

.dex-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  background: rgba(255,255,255,0.7);
  padding: 14px;
  border-radius: 20px;
  border: 3px solid var(--pika-yellow);
}
.dex-cell {
  aspect-ratio: 1;
  background: white;
  border: 3px solid #DDD;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.dex-cell.caught {
  border-color: var(--pb-red);
  background: linear-gradient(135deg, white, #FFF8E7);
}
.dex-cell img {
  width: 100%;
  height: 65%;
  object-fit: contain;
}
.dex-cell.locked img {
  filter: brightness(0) opacity(0.3);
}
.dex-cell .dex-num {
  font-size: 14px;
  color: var(--text-light);
  font-weight: 800;
  position: absolute;
  top: 4px;
  left: 8px;
}
.dex-cell .dex-name {
  font-size: 16px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
  margin-top: 4px;
}
.dex-cell.locked .dex-name {
  color: transparent;
}
.dex-cell.locked::after {
  content: '?';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 56px;
  font-weight: 900;
  color: var(--text-light);
  opacity: 0.4;
}

/* === 圖鑑篩選 Tab === */
.dex-filter {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 12px;
  padding: 8px;
  background: white;
  border-radius: 20px;
  border: 3px solid var(--pika-yellow);
}
.dex-filter-btn {
  flex: 1;
  padding: 10px 4px;
  border: 3px solid #DDD;
  border-radius: 16px;
  background: white;
  color: var(--text-light);
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.dex-filter-btn.active {
  background: var(--pb-red);
  border-color: var(--pb-red);
  color: white;
  box-shadow: 0 3px 8px rgba(238,21,21,0.3);
}
.dex-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px 20px;
  font-size: 22px;
  font-weight: 900;
  color: var(--text-light);
}
.dex-empty.celebrate {
  color: var(--pb-red-deep);
}

/* === 圖鑑分頁按鈕 === */
.dex-pager {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  padding: 12px;
  background: white;
  border: 3px solid var(--pika-yellow);
  border-radius: 20px;
}
.dex-pager-btn {
  padding: 12px 20px;
  border: 3px solid var(--pb-red);
  border-radius: 20px;
  background: var(--pb-red);
  color: white;
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  min-width: 110px;
  box-shadow: 0 2px 6px rgba(238,21,21,0.3);
}
.dex-pager-btn:disabled {
  background: #EEE;
  border-color: #DDD;
  color: #AAA;
  cursor: not-allowed;
  box-shadow: none;
}
.dex-pager-info {
  font-size: 22px;
  font-weight: 900;
  color: var(--pb-red-deep);
  letter-spacing: 1px;
}

/* === 彩紙 === */
#confettiContainer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 350;
}

/* === 響應式 === */
@media (max-width: 380px) {
  .machine-top { width: 280px; height: 200px; }
  .machine-top .glass { width: 240px; height: 160px; }
  .mini-ball { width: 58px; height: 58px; }
  .machine-body { width: 300px; }
  .twist-btn { width: 100px; height: 100px; font-size: 26px; }
  .machine-exit { width: 100px; }
  .machine-feet { gap: 95px; }
  .main-title { font-size: 28px; }
  .result-name { font-size: 30px; }
  .result-char { width: 120px; height: 120px; }
  .dex-grid { grid-template-columns: repeat(2, 1fr); }
  .dex-cell .dex-name { font-size: 15px; }
  .dex-pager-btn { font-size: 17px; padding: 10px 14px; min-width: 90px; }
  .dex-pager-info { font-size: 18px; }
}

/* === Loading === */
.loading-mask {
  position: fixed;
  inset: 0;
  background: rgba(255,203,5,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 500;
  flex-direction: column;
  gap: 16px;
}
.loading-mask.active { display: flex; }
.loading-ball {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: conic-gradient(var(--pb-red) 0 50%, white 50% 100%);
  border: 4px solid var(--pb-dark);
  animation: twistSpin 1s linear infinite;
  position: relative;
}
.loading-ball::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 16px; height: 16px;
  background: white;
  border: 3px solid var(--pb-dark);
  border-radius: 50%;
}
.loading-text {
  font-size: 18px;
  font-weight: 900;
  color: var(--pb-dark);
}
</style>

// localStorage Key
var STORAGE_KEY = 'pokemon-gashapon-v1';

// ============ 狀態 ============
var state = {
  caught: [],      // 已收集的 id 陣列
  todayPartner: null,  // { id, date }
  totalTwists: 0
};

function loadState() {
  var d = localStorage.getItem(STORAGE_KEY);
  if (d) {
    try {
      var parsed = JSON.parse(d);
      state.caught = parsed.caught || [];
      state.todayPartner = parsed.todayPartner || null;
      state.totalTwists = parsed.totalTwists || 0;
    } catch(e) {}
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayString() {
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

// ============ 渲染 ============
function renderBalls() {
  var glass = document.getElementById('glassBox');
  var html = '';
  var types = ['', '', 'great', 'ultra', '', 'master'];
  for (var i = 0; i < 6; i++) {
    html += '<div class="mini-ball ' + types[i] + '">';
    html += '<div class="ball-top"></div>';
    html += '<div class="ball-bottom"></div>';
    html += '<div class="ball-line"></div>';
    html += '<div class="ball-center"></div>';
    html += '</div>';
  }
  glass.innerHTML = html;
}

function renderCollectionCount() {
  var count = state.caught.length;
  document.getElementById('collectionCount').textContent = '已收服 ' + count + ' / 151';
  document.getElementById('dexProgress').textContent = count + ' / 151';
}

function renderTodayPartner() {
  var el = document.getElementById('todayPartner');
  var img = document.getElementById('todayPartnerImg');
  var nameEl = document.getElementById('todayPartnerName');
  var today = todayString();

  if (state.todayPartner && state.todayPartner.date === today) {
    var p = POKEMON.find(function(x){ return x.id === state.todayPartner.id; });
    if (p) {
      el.classList.remove('empty');
      img.src = getPokemonImg(p.id);
      img.style.display = 'block';
      nameEl.textContent = p.name;
      return;
    }
  }
  el.classList.add('empty');
  img.style.display = 'none';
  nameEl.textContent = '轉一次就有囉！';
}

// 圖鑑分頁 + 篩選
var DEX_PAGE_SIZE = 12;
var dexCurrentPage = 0;
var dexFilter = 'all';  // 'all' | 'caught' | 'locked'

function getFilteredPokemon() {
  if (dexFilter === 'caught') {
    return POKEMON.filter(function(p) { return state.caught.indexOf(p.id) !== -1; });
  }
  // 'all' 和 'preview' 都回傳全部 151 隻，差別在顯示方式
  return POKEMON;
}

function setDexFilter(filter) {
  dexFilter = filter;
  dexCurrentPage = 0;
  // 更新 Tab 按鈕樣式
  document.getElementById('filterAll').classList.toggle('active', filter === 'all');
  document.getElementById('filterCaught').classList.toggle('active', filter === 'caught');
  document.getElementById('filterPreview').classList.toggle('active', filter === 'preview');
  renderDex();
}

function renderDex() {
  var grid = document.getElementById('dexGrid');
  var list = getFilteredPokemon();
  var total = Math.max(1, Math.ceil(list.length / DEX_PAGE_SIZE));
  if (dexCurrentPage >= total) dexCurrentPage = total - 1;
  if (dexCurrentPage < 0) dexCurrentPage = 0;

  var html = '';
  if (list.length === 0) {
    if (dexFilter === 'caught') {
      html = '<div class="dex-empty">還沒有收服的寶可夢<br>去轉扭蛋吧！</div>';
    }
  } else {
    var start = dexCurrentPage * DEX_PAGE_SIZE;
    var end = Math.min(start + DEX_PAGE_SIZE, list.length);
    for (var i = start; i < end; i++) {
      var p = list[i];
      var caught = state.caught.indexOf(p.id) !== -1;
      // 大百科模式：全部顯示彩色（當作 caught）
      var showAsCaught = caught || dexFilter === 'preview';
      html += '<div class="dex-cell ' + (showAsCaught ? 'caught' : 'locked') + '" onclick="showDexDetail(' + p.id + ')">';
      html += '<div class="dex-num">#' + String(p.id).padStart(3, '0') + '</div>';
      html += '<img src="' + getPokemonImg(p.id) + '" alt="" loading="lazy">';
      html += '<div class="dex-name">' + p.name + '</div>';
      html += '</div>';
    }
  }
  grid.innerHTML = html;

  document.getElementById('dexPagerInfo').textContent = (dexCurrentPage + 1) + ' / ' + total;
  document.getElementById('dexPrevBtn').disabled = dexCurrentPage === 0;
  document.getElementById('dexNextBtn').disabled = dexCurrentPage >= total - 1 || list.length === 0;
}

function changeDexPage(delta) {
  dexCurrentPage += delta;
  renderDex();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showDexDetail(id) {
  var caught = state.caught.indexOf(id) !== -1;
  // 大百科模式下未收服也能看；其他模式只有收服過才能點開
  if (!caught && dexFilter !== 'preview') return;
  var p = POKEMON.find(function(x){ return x.id === id; });
  if (!p) return;
  showResult(p, false);
}

// ============ 頁面切換 ============
function showPage(page) {
  if (page === 'home') {
    document.getElementById('homePage').style.display = 'block';
    document.getElementById('dexPage').classList.remove('active');
    document.getElementById('navHome').classList.add('active');
    document.getElementById('navDex').classList.remove('active');
  } else {
    document.getElementById('homePage').style.display = 'none';
    document.getElementById('dexPage').classList.add('active');
    document.getElementById('navHome').classList.remove('active');
    document.getElementById('navDex').classList.add('active');
    renderDex();
  }
}

// ============ 扭蛋邏輯 ============
var isAnimating = false;
var currentPick = null;
var isNewCatch = false;

function twist() {
  if (isAnimating) return;
  isAnimating = true;

  // 隨機抽一隻
  var idx = Math.floor(Math.random() * POKEMON.length);
  currentPick = POKEMON[idx];
  isNewCatch = state.caught.indexOf(currentPick.id) === -1;

  // 動畫
  var machine = document.getElementById('machine');
  var btn = document.getElementById('twistBtn');
  btn.classList.add('spinning');
  machine.classList.add('shaking');

  setTimeout(function() {
    machine.classList.remove('shaking');
    btn.classList.remove('spinning');

    // 膠囊內容
    document.getElementById('capsuleFace').src = getPokemonImg(currentPick.id);

    var overlay = document.getElementById('capsuleOverlay');
    overlay.classList.add('active');
    var capsule = document.getElementById('capsuleBall');
    capsule.classList.remove('opened');
    capsule.classList.add('bounce');
  }, 1200);
}

function openCapsule() {
  var capsule = document.getElementById('capsuleBall');
  if (capsule.classList.contains('opened')) return;
  capsule.classList.add('opened');

  // 魔法粒子
  var sparkles = document.getElementById('magicSparkles');
  var icons = ['✨','⚡','⭐','🌟','💫','💛'];
  sparkles.innerHTML = '';
  for (var i = 0; i < 14; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = icons[i % icons.length];
    var angle = (i / 14) * 360;
    var dist = 70 + Math.random() * 50;
    var x = Math.cos(angle * Math.PI / 180) * dist;
    var y = Math.sin(angle * Math.PI / 180) * dist;
    s.style.cssText = 'left:50%;top:50%;--sparkle-end:translate('+x+'px,'+y+'px);animation-delay:'+(i*0.04)+'s;';
    sparkles.appendChild(s);
  }

  setTimeout(function() {
    document.getElementById('capsuleOverlay').classList.remove('active');
    capsule.classList.remove('bounce', 'opened');

    // 更新狀態
    if (isNewCatch) {
      state.caught.push(currentPick.id);
    }
    // 今日搭檔：每次抽到的就是最新搭檔（可隨時換）
    state.todayPartner = { id: currentPick.id, date: todayString() };
    state.totalTwists++;
    saveState();

    showResult(currentPick, isNewCatch);
    renderCollectionCount();
    renderTodayPartner();

    if (isNewCatch) launchConfetti();
  }, 800);
}

function showResult(pokemon, isNew) {
  var char = document.getElementById('resultChar');
  char.src = getPokemonImg(pokemon.id);
  char.classList.toggle('new-catch', isNew);

  document.getElementById('resultNumber').textContent = 'No. ' + String(pokemon.id).padStart(3, '0');
  document.getElementById('resultName').textContent = pokemon.name;

  var badge = document.getElementById('resultBadge');
  if (isNew) {
    badge.textContent = '✨ 新收集！';
    badge.classList.add('new');
  } else {
    badge.textContent = '圖鑑已擁有';
    badge.classList.remove('new');
  }

  var dialogues = isNew ? DIALOGUES_NEW : DIALOGUES_OLD;
  document.getElementById('resultDialogue').textContent = dialogues[Math.floor(Math.random() * dialogues.length)];

  document.getElementById('resultCard').classList.add('active');
}

function closeResult() {
  document.getElementById('resultCard').classList.remove('active');
  stopConfetti();
  isAnimating = false;
}

function retry() {
  closeResult();
  setTimeout(twist, 300);
}

// ============ 彩紙 ============
function launchConfetti() {
  var container = document.getElementById('confettiContainer');
  var emojis = ['🎉','✨','⚡','⭐','🌟','💛','🔴','⚪'];
  function burst() {
    for (var i = 0; i < 25; i++) {
      var c = document.createElement('div');
      c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      c.style.cssText = 'position:fixed;top:-20px;left:'+Math.random()*100+'%;font-size:'+(16+Math.random()*20)+'px;animation:confettiFall '+(1.8+Math.random()*2.2)+'s linear forwards;pointer-events:none;';
      container.appendChild(c);
      setTimeout(function(el){ el.remove(); }.bind(null, c), 4500);
    }
  }
  burst();
  window._confettiInterval = setInterval(burst, 2500);
  setTimeout(stopConfetti, 4000);
}

function stopConfetti() {
  if (window._confettiInterval) {
    clearInterval(window._confettiInterval);
    window._confettiInterval = null;
  }
}

// ============ 背景裝飾 ============
function renderBgDeco() {
  var container = document.getElementById('bgDeco');
  // 寶可夢小圖飄浮（全 151 隻隨機抽，密集版、無 emoji）
  var picked = {};
  var count = 0;
  var totalPokemon = 60;   // 密度：60 隻同時飄
  var maxAttempts = 400;
  var attempts = 0;
  while (count < totalPokemon && attempts < maxAttempts) {
    attempts++;
    var pid = 1 + Math.floor(Math.random() * 151);
    // 不強制去重，但連續同一隻機率降低
    if (picked[pid] && picked[pid] >= 2) continue;
    picked[pid] = (picked[pid] || 0) + 1;

    var img = document.createElement('img');
    img.src = getPokemonImg(pid);
    img.loading = 'lazy';
    var size = 45 + Math.random() * 55;
    var rotate = Math.random() * 60 - 30;
    img.style.cssText = 'position:fixed;width:'+size+'px;height:'+size+'px;object-fit:contain;left:'+Math.random()*94+'%;top:'+Math.random()*94+'%;opacity:'+(0.04+Math.random()*0.06)+';transform:rotate('+rotate+'deg);animation:floatParticle '+(8+Math.random()*8)+'s linear infinite;animation-delay:'+Math.random()*8+'s;pointer-events:none;z-index:0;';
    container.appendChild(img);
    count++;
  }
}

// ============ 初始化 ============
window.onload = function() {
  loadState();
  renderBalls();
  renderBgDeco();
  renderCollectionCount();
  renderTodayPartner();
};
</script>
